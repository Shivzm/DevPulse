<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="DevPulse - Premium System Status Dashboard"
    />
    <title>DevPulse // System Status</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Ambient background grid -->
    <div class="cyber-grid-bg"></div>

    <main class="container">
      <!-- Hero Header with Split Text Animation -->
      <header class="hero">
        <h1 class="split-text">SYSTEMS OPERATIONAL</h1>
        <p class="subtitle">Global infrastructure pulse tracking index</p>
      </header>

      <!-- Bento Grid: Service Status Cards -->
      <section class="services-section">
        <h2 class="section-title">Service Status</h2>
        <div
          id="services-grid"
          class="bento-grid"
          aria-label="Service status monitors"
        ></div>
      </section>

      <!-- Timeline: Incident History -->
      <section class="timeline-section">
        <h2 class="section-title">Incident History</h2>
        <div class="timeline-wrapper">
          <div class="timeline-spine"></div>
          <div
            id="timeline-events"
            class="timeline-events"
            aria-label="Historical incidents"
          ></div>
        </div>
      </section>

      <!-- Loading state indicator -->
      <div
        id="loading-indicator"
        class="loading-pulse"
        aria-live="polite"
        role="status"
      ></div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
